<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Phishing Detective | Interactive Cyber Security Quiz Game</title>
    <meta name="description" content="Test your cyber defense awareness with Phishing Detective. Learn to spot fake URLs, spoofed headers, and dangerous online traps in real-time.">
    <meta name="keywords" content="phishing detective, cyber security game, spot the phishing trap, learn cybersecurity, interactive anti phishing quiz, phantomix simulation">
    
    <meta property="og:title" content="Phishing Detective | Phantomix">
    <meta property="og:description" content="Analyze incoming data packets, fake URLs, and spoofed headers. Can you spot the cyber trap?">
    <meta property="og:url" content="https://phantomix-dev.github.io/detective.html">
    <meta property="og:image" content="https://raw.githubusercontent.com/Phantomix-dev/phantomix-dev.github.io/refs/heads/main/%E2%80%8Bdiamondmax-logo.png">
    <meta name="theme-color" content="#0B1221">

    <style>
        /* ✨ PREMIUM FADE-IN ANIMATION */
        body {
            animation: appLoad 0.8s ease-out forwards;
        }

        @keyframes appLoad {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        :root {
            --bg-main: #0B1221;
            --card-bg: #151E32;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-green: #10B981;
            --accent-red: #EF4444;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px 15px; margin: 0; display: flex; justify-content: center; }
        .game-container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); box-sizing: border-box; }
        h1 { font-size: 1.6em; margin-top: 0; margin-bottom: 5px; font-weight: 700; }
        .score-board { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 20px; margin-bottom: 25px; font-weight: 600; color: var(--accent-green); }
        .case-card { background: rgba(0,0,0,0.15); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: left; margin-bottom: 25px; min-height: 150px; }
        .sender-info { color: var(--text-muted); font-size: 0.9em; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .email-body { font-size: 1.05em; line-height: 1.6; color: var(--text-main); }
        .url-box { background: rgba(0,0,0,0.3); padding: 12px; border-left: 4px solid var(--accent-green); border-radius: 4px; font-size: 0.9em; color: #60A5FA; word-break: break-all; margin-top: 15px; font-family: monospace; }
        .choice-btn { width: 45%; padding: 14px; font-size: 1em; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; margin: 5px; }
        .btn-safe { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .btn-safe:hover { background: var(--accent-green); color: #fff; }
        .btn-phish { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }
        .btn-phish:hover { background: var(--accent-red); color: #fff; }
        #feedback { margin-top: 20px; font-size: 1.1em; font-weight: 600; min-height: 30px; }
        @media (max-width: 480px) { .choice-btn { width: 100%; margin: 8px 0; } }
    </style>
</head>
<body>
    <style>
    body { padding-top: 80px; } /* Navbar ke liye space */
    .phantomix-top-nav {
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 20px; box-sizing: border-box;
        background: rgba(11, 18, 33, 0.85); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(59, 130, 246, 0.2); z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .nav-brand { font-size: 18px; font-weight: 700; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-brand span { color: #3B82F6; }
    .nav-back {
        background: rgba(59, 130, 246, 0.1); color: #3B82F6;
        padding: 6px 14px; border: 1px solid #3B82F6; border-radius: 6px;
        text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.3s;
    }
    .nav-back:hover { background: #3B82F6; color: #fff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
</style>
<nav class="phantomix-top-nav">
    <a href="apps.html" class="nav-brand"><span>✦</span> Phantomix</a>
    <a href="apps.html" class="nav-back">← Hub</a>
</nav>

    <div class="game-container">
        <h1>🎣 Phishing Detective</h1>
        <p style="color: var(--text-muted); margin: 0; font-size: 0.9em;">SYSTEM ANALYSIS INTERFACE v1.0.4</p>
        <div class="score-board">
            <div>LEVEL: <span id="current-level">1</span>/3</div>
            <div>SCORE: <span id="current-score">0</span></div>
        </div>
        <div class="case-card">
            <div class="sender-info" id="case-sender">FROM: loading...</div>
            <div class="email-body" id="case-body">Loading simulation vector...</div>
            <div class="url-box" id="case-url">URL: loading...</div>
        </div>
        <button class="choice-btn btn-safe" onclick="submitDecision(true)">VERIFIED SAFE</button>
        <button class="choice-btn btn-phish" onclick="submitDecision(false)">PHISHING TRAP</button>
        <div id="feedback"></div>
    </div>
    <script>
        const cases = [
            { sender: "security@netflix-billing.com", body: "Your subscription renewal failed. Please update your payment details within 24 hours to avoid account suspension.", url: "http://netflx-account-update.com/login", isSafe: false, reason: "🚨 TRAP! Sender domain is 'netflx' (missing 'i') and uses insecure http protocol." },
            { sender: "no-reply@github.com", body: "Someone recently logged into your account from a new IP address in Berlin, Germany. If this wasn't you, verify the activity details.", url: "https://github.com/settings/security/audit-log", isSafe: true, reason: "🟢 SAFE! Genuine HTTPS encryption routing straight to official GitHub security sub-domains." },
            { sender: "support@lndia-post-tracking.in", body: "Your package could not be delivered due to an incorrect house number. Please track your parcel and update the address immediately.", url: "https://india-post.tracking-delivery-portal.xyz/track", isSafe: false, reason: "🚨 TRAP! Look closely: 'lndia' starts with a lowercase L instead of an uppercase I, and the domain ends in .xyz!" }
        ];
        let index = 0; let score = 0;
        function loadCase() {
            if(index >= cases.length) {
                document.querySelector('.case-card').innerHTML = `<h2 style='color:var(--accent-green); text-align:center;'>🏆 CASE CLOSED</h2><p style='text-align:center;'>Excellent work, Detective! Final Score: ${score}/${cases.length}</p>`;
                document.querySelectorAll('.choice-btn').forEach(b => b.style.display = 'none');
                return;
            }
            document.getElementById('case-sender').innerText = "FROM: " + cases[index].sender;
            document.getElementById('case-body').innerText = cases[index].body;
            document.getElementById('case-url').innerText = "TARGET LINK: " + cases[index].url;
            document.getElementById('current-level').innerText = index + 1;
            document.getElementById('feedback').innerText = "";
        }
        function submitDecision(userSaidSafe) {
            const currentCase = cases[index]; const feedbackBox = document.getElementById('feedback');
            if(userSaidSafe === currentCase.isSafe) {
                score++; document.getElementById('current-score').innerText = score;
                feedbackBox.innerHTML = "<span style='color:var(--accent-green);'>✔️ ACCESS GRANTED: Correct Assessment!</span>";
            } else {
                feedbackBox.innerHTML = "<span style='color:var(--accent-red);'>❌ PROTOCOL COMPROMISED! " + currentCase.reason + "</span>";
            }
            index++; setTimeout(loadCase, 3500);
        }
        window.onload = loadCase;
    </script>
</body>
</html>
