    <style>
        /* 🎨 CUSTOM PHANTOMIX TEXT SELECTION */
        ::selection {
            background-color: #0ea5e9; /* Neon Blue */
            color: #ffffff; /* White Text */
        }
        
        /* Firefox browser ke liye */

            background-color: #0ea5e9;
            color: #ffffff;
        }
        /* ✨ PREMIUM FADE-IN ANIMATION */

            animation: appLoad 0.8s ease-out forwards;
        }

        @keyframes appLoad {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        :root {
            --bg-main: #0B1221;
            --card-bg: #151E32;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-blue: #3B82F6;
        }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px 15px; margin: 0; display: flex; justify-content: center; }
        .encoder-container { width: 100%; max-width: 650px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); box-sizing: border-box; }
        h1 { font-size: 1.6em; margin-top: 0; margin-bottom: 5px; font-weight: 700; }
        p { color: var(--text-muted); font-size: 0.95em; margin-bottom: 30px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { font-weight: 600; color: var(--text-main); display: block; margin-bottom: 8px; font-size: 0.9em; letter-spacing: 0.5px; }
        textarea { width: 100%; height: 90px; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; font-size: 1.05em; resize: none; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .copy-btn { background: rgba(255,255,255,0.1); color: var(--text-main); border: none; padding: 6px 12px; cursor: pointer; float: right; font-size: 0.8em; margin-top: -30px; margin-right: 5px; position: relative; border-radius: 6px; font-weight: 600; transition: 0.2s; }
        .copy-btn:hover { background: var(--accent-blue); color: #fff; }

<body>
    <style>
    body { padding-top: 80px; } /* Navbar ke liye space */
    .phantomix-top-nav {
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        display: flex; justify-content: space-between; align-items: center;

        background: rgba(11, 18, 33, 0.85); backdrop-filter: blur(12px);

        background: rgba(59, 130, 246, 0.1); color: #3B82F6;

</style>
<nav class="phantomix-top-nav">
    <a href="apps.html" class="nav-brand"><span>✦</span> Phantomix</a>
    <a href="apps.html" class="nav-back">← Hub</a>

    <div class="encoder-container">
        <h1>🔢 Cipher Machine</h1>
        <p>SYSTEM PROTOCOL: AUTO-SYNC ENABLED</p>
        <div class="input-group">
            <label>STANDARD TEXT STREAM</label>
            <button class="copy-btn" onclick="copyText('text-input')">COPY</button>
            <textarea id="text-input" placeholder="Type normal text here to encrypt..." oninput="convertFromText()"></textarea>
        </div>
        <div class="input-group">
            <label>BINARY MACHINE CODE (Base2)</label>
            <button class="copy-btn" onclick="copyText('binary-input')">COPY</button>
            <textarea id="binary-input" placeholder="01110100 01100101..." oninput="convertFromBinary()"></textarea>
        </div>
        <div class="input-group">
            <label>HEXADECIMAL CIPHER (Base16)</label>
            <button class="copy-btn" onclick="copyText('hex-input')">COPY</button>
            <textarea id="hex-input" placeholder="74 65 78 74..." oninput="convertFromHex()"></textarea>
        </div>
    </div>
    <script>
        const textInput = document.getElementById('text-input'); const binInput = document.getElementById('binary-input'); const hexInput = document.getElementById('hex-input');
        function convertFromText() {
            let str = textInput.value; if(!str) { binInput.value = ""; hexInput.value = ""; return; }
            binInput.value = str.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
            hexInput.value = str.split('').map(char => char.charCodeAt(0).toString(16).padStart(2, '0')).join(' ');
        }
        function convertFromBinary() {
            let binStr = binInput.value.trim().replace(/[^01 ]/g, ""); if(!binStr) { textInput.value = ""; hexInput.value = ""; return; }
            let binArray = binStr.split(' ').filter(b => b.length > 0);
            try {
                let textResult = binArray.map(b => String.fromCharCode(parseInt(b, 2))).join('');
                textInput.value = textResult; hexInput.value = textResult.split('').map(char => char.charCodeAt(0).toString(16).padStart(2, '0')).join(' ');
            } catch(e) { }
        }
        function convertFromHex() {
            let hexStr = hexInput.value.trim().replace(/[^0-9a-fA-F ]/g, ""); if(!hexStr) { textInput.value = ""; binInput.value = ""; return; }
            let hexArray = hexStr.split(' ').filter(h => h.length > 0);
            try {
                let textResult = hexArray.map(h => String.fromCharCode(parseInt(h, 16))).join('');
                textInput.value = textResult; binInput.value = textResult.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
            } catch(e) { }
        }
        function copyText(elementId) {
            const el = document.getElementById(elementId); if(!el.value) return;
            navigator.clipboard.writeText(el.value).then(() => { alert("Copied to clipboard!"); });
        }
    </script>
</body>
</html>
