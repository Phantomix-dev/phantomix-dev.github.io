<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-to-Canvas | Phantomix</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: monospace; text-align: center; padding: 30px; }
        textarea { width: 80%; height: 120px; background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-family: monospace; }
        
        /* The Visual Canvas Box */
        #canvas-preview { 
            width: 80%; 
            max-width: 600px;
            margin: 30px auto; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Futuristic Cyber Gradient */
            padding: 40px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,255,0,0.1);
            text-align: left;
            box-sizing: border-box;
        </div>
        
        #code-window {
            background: #050505;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            color: #00ff00;
            font-size: 1.1em;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Fake Mac-style window dots */
        .dots { display: flex; gap: 8px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        button { background: #00ff00; color: #000; padding: 12px 30px; border: none; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 10px; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

    <h1>🎨 Code-to-Canvas Studio</h1>
    <p>Generate high-end aesthetic images of your source code chunks.</p>

    <textarea id="code-input" placeholder="Paste your code snippet here..." oninput="updateSnippet()"></textarea><br>

    <div id="canvas-preview">
        <div id="code-window">
            <div class="dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <code id="code-output">// Your code snapshot will render here...</code>
        </div>
    </div>

    <button onclick="exportToImage()">Download Snippet Image</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        function updateSnippet() {
            const rawCode = document.getElementById('code-input').value;
            const outputNode = document.getElementById('code-output');
            
            if(rawCode.trim() === "") {
                outputNode.innerText = "// Your code snapshot will render here...";
            } else {
                outputNode.innerText = rawCode;
            }
        }

        function exportToImage() {
            const target = document.getElementById('canvas-preview');
            
            // html2canvas div ko direct image mein convert kar deta hai
            html2canvas(target, { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'phantomix_snippet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
