<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruteforce Simulator | Phantomix</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-green: #00ff00;
            --panel-bg: #111111;
        }
        body { 
            background-color: var(--bg-color); 
            color: #ffffff; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding: 30px;
            margin: 0;
        }
        .simulator-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.1);
        }
        h1 { color: var(--neon-green); text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        input { 
            width: 85%; 
            padding: 15px; 
            background: #000; 
            color: var(--neon-green); 
            border: 1px solid var(--neon-green); 
            font-size: 1.2em; 
            text-align: center; 
            font-family: monospace;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .result-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .metric { font-size: 1.1em; margin: 10px 0; color: #bbb; }
        .metric span { color: #fff; font-weight: bold; }
        #crack-time { font-size: 1.5em; color: #ff003c; font-weight: bold; text-shadow: 0 0 5px rgba(255,0,60,0.2); }
    </style>
</head>
<body>

    <div class="simulator-container">
        <h1>🔑 BRUTEFORCE SIMULATOR</h1>
        <p style="color: #666;">ENTROPY CORRELATION MATRIX</p>

        <input type="text" id="pass-input" placeholder="Enter target password to audit..." oninput="auditPassword()">

        <div class="result-panel">
            <div class="metric">Estimated Time to Crack:</div>
            <div id="crack-time">0 seconds</div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <div class="metric">Total Combinations: <span id="combinations-count">0</span></div>
            <div class="metric">Security Rating: <span id="security-rating" style="color: red;">VULNERABLE</span></div>
        </div>
    </div>

    <script>
        function auditPassword() {
            const password = document.getElementById('pass-input').value;
            const timeDisplay = document.getElementById('crack-time');
            const comboDisplay = document.getElementById('combinations-count');
            const ratingDisplay = document.getElementById('security-rating');

            if (!password) {
                timeDisplay.innerText = "0 seconds";
                timeDisplay.style.color = "#ff003c";
                comboDisplay.innerText = "0";
                ratingDisplay.innerText = "VULNERABLE";
                ratingDisplay.style.color = "red";
                return;
            }

            // Pool size calculation based on character variety
            let poolSize = 0;
            if (/[a-z]/.test(password)) poolSize += 26; // Lowercase
            if (/[A-Z]/.test(password)) poolSize += 26; // Uppercase
            if (/[0-9]/.test(password)) poolSize += 10; // Numbers
            if (/[^a-zA-Z0-9]/.test(password)) poolSize += 33; // Special symbols

            // Math formula: Total Combinations = PoolSize ^ PasswordLength
            let totalCombinations = Math.pow(poolSize, password.length);
            comboDisplay.innerText = totalCombinations.toExponential(2);

            // Assuming a standard fast hacker rig doing 10 Billion (10,000,000,000) guesses per second
            let speed = 10000000000;
            let secondsToCrack = totalCombinations / speed;

            // Time translation logic
            let displayTime = "";
            if (secondsToCrack < 1) {
                displayTime = "Instantly (Less than a millisecond) 💥";
                timeDisplay.style.color = "#ff003c";
                ratingDisplay.innerText = "CRITICAL FAILURE";
                ratingDisplay.style.color = "#ff003c";
            } else if (secondsToCrack < 60) {
                displayTime = Math.floor(secondsToCrack) + " seconds";
                timeDisplay.style.color = "#ff003c";
                ratingDisplay.innerText = "WEAK";
                ratingDisplay.style.color = "orange";
            } else if (secondsToCrack < 3600) {
                displayTime = Math.floor(secondsToCrack / 60) + " minutes";
                timeDisplay.style.color = "orange";
                ratingDisplay.innerText = "MODERATE";
                ratingDisplay.style.color = "yellow";
            } else if (secondsToCrack < 86400) {
                displayTime = Math.floor(secondsToCrack / 3600) + " hours";
                timeDisplay.style.color = "yellow";
                ratingDisplay.innerText = "SECURE";
                ratingDisplay.style.color = "#00ff00";
            } else if (secondsToCrack < 31536000) {
                displayTime = Math.floor(secondsToCrack / 86400) + " days";
                timeDisplay.style.color = "#00ff00";
                ratingDisplay.innerText = "HIGH SECURITY";
                ratingDisplay.style.color = "#00ff00";
            } else {
                let years = Math.floor(secondsToCrack / 31536000);
                displayTime = years.toLocaleString() + " years 🛡️";
                timeDisplay.style.color = "#00ff00";
                ratingDisplay.innerText = "MILITARY GRADE";
                ratingDisplay.style.color = "#00ff00";
            }

            timeDisplay.innerText = displayTime;
        }
    </script>
</body>
</html>
