    <div class="simulator-container">
        <h1>Bruteforce Simulator</h1>
        <p class="subtitle">Test your password against advanced cracking algorithms.</p>

        <input type="text" id="pass-input" placeholder="Enter password to audit..." oninput="auditPassword()">

        <div class="result-panel">
            <div class="metric" style="display: block;">
                Estimated Time to Crack:
                <span id="crack-time">0 seconds</span>
            </div>
            <hr>
            <div class="metric">Total Combinations: <span id="combinations-count">0</span></div>
            <div class="metric">Security Rating: <span id="security-rating" style="color: var(--accent-red);">VULNERABLE</span></div>
        </div>
    </div>

    <script>
        // Same perfect logic as before, just UI changed!
        function auditPassword() {
            const password = document.getElementById('pass-input').value;
            const timeDisplay = document.getElementById('crack-time');
            const comboDisplay = document.getElementById('combinations-count');
            const ratingDisplay = document.getElementById('security-rating');

            if (!password) {
                timeDisplay.innerText = "0 seconds";
                timeDisplay.style.color = "var(--accent-red)";
                comboDisplay.innerText = "0";
                ratingDisplay.innerText = "VULNERABLE";
                ratingDisplay.style.color = "var(--accent-red)";
                return;
            }

            let poolSize = 0;
            if (/[a-z]/.test(password)) poolSize += 26; 
            if (/[A-Z]/.test(password)) poolSize += 26; 
            if (/[0-9]/.test(password)) poolSize += 10; 
            if (/[^a-zA-Z0-9]/.test(password)) poolSize += 33; 

            let totalCombinations = Math.pow(poolSize, password.length);
            comboDisplay.innerText = totalCombinations.toExponential(2);

            let speed = 10000000000;
            let secondsToCrack = totalCombinations / speed;

            let displayTime = "";
            if (secondsToCrack < 1) {
                displayTime = "Instantly 💥";
                timeDisplay.style.color = "var(--accent-red)";
                ratingDisplay.innerText = "CRITICAL";
                ratingDisplay.style.color = "var(--accent-red)";
            } else if (secondsToCrack < 60) {
                displayTime = Math.floor(secondsToCrack) + " seconds";
                timeDisplay.style.color = "var(--accent-red)";
                ratingDisplay.innerText = "WEAK";
                ratingDisplay.style.color = "#F59E0B"; /* Warning Orange */
            } else if (secondsToCrack < 3600) {
                displayTime = Math.floor(secondsToCrack / 60) + " minutes";
                timeDisplay.style.color = "#F59E0B";
                ratingDisplay.innerText = "MODERATE";
                ratingDisplay.style.color = "#F59E0B";
            } else if (secondsToCrack < 86400) {
                displayTime = Math.floor(secondsToCrack / 3600) + " hours";
                timeDisplay.style.color = "var(--accent-green)";
                ratingDisplay.innerText = "SECURE";
                ratingDisplay.style.color = "var(--accent-green)";
            } else {
                let years = Math.floor(secondsToCrack / 31536000);
                displayTime = years.toLocaleString() + " years 🛡️";
                timeDisplay.style.color = "var(--accent-green)";
                ratingDisplay.innerText = "MILITARY GRADE";
                ratingDisplay.style.color = "var(--accent-green)";
            }

            timeDisplay.innerText = displayTime;
        }
    </script>
