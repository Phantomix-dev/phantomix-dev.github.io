    <div class="container">
        <h1>📸 EXIF Stripper</h1>
        <p>Wipe hidden tracking data and GPS locations before sharing.</p>

        <label class="upload-btn">
            Drop or Click to Upload Target Image
            <input type="file" id="image-loader" accept="image/*" style="display: none;" onchange="processImage()">
        </label>

        <img id="preview" alt="Secure Preview">
        <div id="status"></div>
        <button id="download-btn" class="action-btn" onclick="downloadCleanImage()">Download Sanitized Image</button>
    </div>

    <script>
        let cleanImageBase64 = null;
        let originalFileName = "sanitized_image.png";

        function processImage() {
            const fileInput = document.getElementById('image-loader');
            const statusDiv = document.getElementById('status');
            const previewImg = document.getElementById('preview');
            const downloadBtn = document.getElementById('download-btn');

            if (!fileInput.files || !fileInput.files[0]) return;
            const file = fileInput.files[0];
            originalFileName = "clean_" + file.name;
            statusDiv.innerText = "Processing transmission...";
            statusDiv.style.color = "var(--text-muted)";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    cleanImageBase64 = canvas.toDataURL('image/png');
                    
                    previewImg.src = cleanImageBase64;
                    previewImg.style.display = "block";
                    statusDiv.innerText = "🎯 METADATA PURGE COMPLETE!";
                    statusDiv.style.color = "var(--accent-green)";
                    downloadBtn.style.display = "block";
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function downloadCleanImage() {
            if (!cleanImageBase64) return;
            const downloadLink = document.createElement('a');
            downloadLink.href = cleanImageBase64;
            downloadLink.download = originalFileName;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
