<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Stripper | Phantomix</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: monospace; text-align: center; padding: 50px; }
        .upload-btn { background: #111; color: #00ff00; border: 1px dashed #00ff00; padding: 30px; display: block; width: 60%; margin: 20px auto; cursor: pointer; font-size: 1.1em; }
        button.action-btn { background: #00ff00; color: #000; padding: 12px 30px; border: none; cursor: pointer; font-weight: bold; font-size: 1em; margin-top: 20px; display: none; margin-left: auto; margin-right: auto; }
        button.action-btn:hover { background: #fff; }
        #status { margin-top: 15px; color: #ff003c; font-weight: bold; }
        #preview { max-width: 300px; margin-top: 20px; border: 1px solid #333; display: none; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <h1>📸 EXIF Metadata Stripper</h1>
    <p>Sanitize your images. Absolute device and tracking data erasure.</p>

    <label class="upload-btn">
        Drop or Click to Upload Target Image
        <input type="file" id="image-loader" accept="image/*" style="display: none;" onchange="processImage()">
    </label>

    <img id="preview" alt="Secure Preview">

    <div id="status"></div>

    <button id="download-btn" class="action-btn" onclick="downloadCleanImage()">Download Sanitized Image</button>

    <script>
        let cleanImageBase64 = null;
        let originalFileName = "sanitized_image.png";

        function processImage() {
            const fileInput = document.getElementById('image-loader');
            const statusDiv = document.getElementById('status');
            const previewImg = document.getElementById('preview');
            const downloadBtn = document.getElementById('download-btn');

            if (!fileInput.files || !fileInput.files[0]) return;

            const file = fileInput.files[0];
            originalFileName = "clean_" + file.name;
            statusDiv.innerText = "Processing transmission... Stripping data segments.";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // THE CLIENT HACK: Canvas par image redraw karne se saara EXIF data automatically backend level par gayab ho jata hai!
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // Pure raw image tokens extraction (PNG compression ensures metadata drop)
                    cleanImageBase64 = canvas.toDataURL('image/png');

                    // Update UI elements
                    previewImg.src = cleanImageBase64;
                    previewImg.style.display = "block";
                    statusDiv.innerText = "🎯 METADATA PURGE COMPLETE! Image sanitized.";
                    statusDiv.style.color = "#00ff00";
                    downloadBtn.style.display = "block";
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function downloadCleanImage() {
            if (!cleanImageBase64) return;

            // Virtual dynamic node processing trigger for file delivery
            const downloadLink = document.createElement('a');
            downloadLink.href = cleanImageBase64;
            downloadLink.download = originalFileName;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
