<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Stripper | Phantomix</title>
    <style>
        :root {
            --bg-main: #0B1221;
            --card-bg: #151E32;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --accent-green: #10B981;
        }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 30px 15px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        h1 { font-size: 1.6em; margin-top: 0; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--text-muted); font-size: 0.95em; margin-bottom: 25px; }
        .upload-btn { 
            background: rgba(0, 0, 0, 0.2); 
            color: var(--text-main); 
            border: 1px dashed var(--border-color); 
            padding: 30px; 
            display: block; 
            border-radius: 12px;
            cursor: pointer; 
            font-size: 1.1em; 
            transition: 0.3s;
        }
        .upload-btn:hover { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.05); }
        button.action-btn { 
            background: var(--accent-green); 
            color: #fff; 
            padding: 14px 30px; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1em; 
            margin-top: 20px; 
            display: none; 
            width: 100%;
            transition: 0.2s;
        }
        button.action-btn:hover { opacity: 0.9; }
        #status { margin-top: 15px; font-weight: 600; }
        #preview { max-width: 100%; border-radius: 8px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 EXIF Stripper</h1>
        <p>Wipe hidden tracking data and GPS locations before sharing.</p>

        <label class="upload-btn">
            Drop or Click to Upload Target Image
            <input type="file" id="image-loader" accept="image/*" style="display: none;" onchange="processImage()">
        </label>

        <img id="preview" alt="Secure Preview">
        <div id="status"></div>
        <button id="download-btn" class="action-btn" onclick="downloadCleanImage()">Download Sanitized Image</button>
    </div>

    <script>
        let cleanImageBase64 = null;
        let originalFileName = "sanitized_image.png";

        function processImage() {
            const fileInput = document.getElementById('image-loader');
            const statusDiv = document.getElementById('status');
            const previewImg = document.getElementById('preview');
            const downloadBtn = document.getElementById('download-btn');

            if (!fileInput.files || !fileInput.files[0]) return;
            const file = fileInput.files[0];
            originalFileName = "clean_" + file.name;
            statusDiv.innerText = "Processing transmission...";
            statusDiv.style.color = "var(--text-muted)";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    cleanImageBase64 = canvas.toDataURL('image/png');
                    
                    previewImg.src = cleanImageBase64;
                    previewImg.style.display = "block";
                    statusDiv.innerText = "🎯 METADATA PURGE COMPLETE!";
                    statusDiv.style.color = "var(--accent-green)";
                    downloadBtn.style.display = "block";
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        function downloadCleanImage() {
            if (!cleanImageBase64) return;
            const downloadLink = document.createElement('a');
            downloadLink.href = cleanImageBase64;
            downloadLink.download = originalFileName;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
