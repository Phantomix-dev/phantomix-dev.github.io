    </a>

    <hr style="border-color: #333; width: 50%; margin-top: 40px;">
    
    <div id="waitlist-box" style="margin-top: 30px; margin-bottom: 50px;">
        <h3 style="color: #00ffff;">🔥 Join VIP Waitlist</h3>
        <p>Get early access to DiamondMax before the world does.</p>
        
        <input type="email" id="user-email" placeholder="Enter your email ID..." required>
        <br>
        <button class="download-btn" onclick="saveEmail()" style="font-size: 16px; padding: 10px 30px; margin-top: 15px;">

        </button>
        
        <p id="waitlist-status" style="color: #00ff00; font-weight: bold; display: none; margin-top: 15px;"></p>
    </div>

    <script>
                function startSecurityCheck() {
            document.getElementById("verify-btn").style.display = "none";
            document.getElementById("progress-container").style.display = "block";
            
            let statusText = document.getElementById("status-message");
            let progressBar = document.getElementById("progress-bar");
            let width = 0;
            
            let interval = setInterval(function() {
                if (width >= 100) {
                    clearInterval(interval); 
                    statusText.innerHTML = "✅ Device Secured. Access Granted!";
                    statusText.style.color = "#00ff00";
                    document.getElementById("real-download-btn").style.display = "inline-block";
                } else {
                    width++; 
                    progressBar.style.width = width + "%";
                    statusText.innerHTML = "Scanning Device: " + width + "%";
                    statusText.style.color = "yellow";
                }
            }, 50); 
        }

        function saveEmail() {
            let emailBox = document.getElementById("user-email");
            let userEmailData = emailBox.value;
            let statusText = document.getElementById("waitlist-status");
            let button = event.target;
            if (userEmailData === "" || userEmailData.includes("@") === false) {
                statusText.innerHTML = "⚠️ Error: Invalid Email Format!";
                statusText.style.color = "red";
                statusText.style.display = "block";
                return;
            } 

           
            statusText.innerHTML = "🔄 Transmitting Data to Phantomix Servers...";
            statusText.style.color = "yellow";
            statusText.style.display = "block";
            button.innerHTML = "WAIT..."; 
            let formspreeURL = "https://formspree.io/f/mlgokwlr";

            fetch(formspreeURL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({ 
                    email: userEmailData, 
                    source: "DiamondMax Official Waitlist" 
                })
            })
            .then(response => {
                if(response.ok) {
                   
                    emailBox.style.display = "none";
                    button.style.display = "none"; 
                    
                    statusText.innerHTML = "🎉 Target Locked! " + userEmailData + " is securely added to the Waitlist.";
                    statusText.style.color = "#00ff00"; 
                } else {
                  
                    statusText.innerHTML = "⚠️ Server Connection Failed!";
                    statusText.style.color = "red";
                    button.innerHTML = "JOIN THE WAITLIST";
                }
            })
            .catch(error => {
            
                statusText.innerHTML = "⚠️ Network Error! Check your internet.";
                statusText.style.color = "red";
                button.innerHTML = "JOIN THE WAITLIST";
            });
        }

    
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }
        
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px arial";
            
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.97) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);
    </script>
