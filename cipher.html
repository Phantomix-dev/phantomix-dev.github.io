<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Cipher | Phantomix</title>
    <link rel="icon" type="image/png" href="./wordcipher-logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            margin: 0; padding: 0; padding-top: 80px;
            font-family: 'Poppins', sans-serif;
            background-color: #020617; /* Deep Cyber Black */
            color: #ffffff;
            text-align: center; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
        }

        /* --- Navbar --- */
        .phantomix-navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; box-sizing: border-box;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(16, 185, 129, 0.3); z-index: 1000;
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; text-decoration: none; }
        .back-btn {
            background: rgba(16, 185, 129, 0.1); color: #10b981;
            padding: 6px 14px; border: 1px solid #10b981; border-radius: 6px;
            text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.3s ease;
        }
        .back-btn:hover { background: #10b981; color: #020617; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); }

        /* --- Game Container --- */
        .game-wrapper {
            max-width: 600px; margin: 40px auto; padding: 0 20px;
        }
        .game-header {
            margin-bottom: 30px;
        }
        .game-header h1 {
            color: #10b981; font-family: 'Courier Prime', monospace;
            font-size: 32px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        .game-header p { color: #94a3b8; font-size: 14px; margin: 0; }

        .cipher-box {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(16, 185, 129, 0.4);
            border-radius: 15px; padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(16, 185, 129, 0.1);
            position: relative;
        }

        .stats-bar {
            display: flex; justify-content: space-between;
            font-family: 'Courier Prime', monospace; font-size: 16px;
            color: #cbd5e1; margin-bottom: 30px;
            border-bottom: 1px dashed rgba(16, 185, 129, 0.3); padding-bottom: 15px;
        }
        .timer { color: #ef4444; font-weight: bold; }
        .score { color: #10b981; font-weight: bold; }

        .scrambled-word {
            font-size: 42px; font-weight: 700; letter-spacing: 10px;
            margin: 20px 0 40px; color: #ffffff;
            font-family: 'Courier Prime', monospace;
            text-transform: uppercase;
        }

        .input-group {
            display: flex; gap: 10px; max-width: 400px; margin: 0 auto;
        }
        .guess-input {
            flex: 1; padding: 15px; border-radius: 8px;
            border: 1px solid #334155; background: #0f172a; color: #10b981;
            font-size: 18px; font-family: 'Courier Prime', monospace; text-transform: uppercase;
            text-align: center; outline: none; transition: all 0.3s;
        }
        .guess-input:focus { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        
        .action-btn {
            background: #10b981; color: #020617;
            border: none; padding: 0 25px; border-radius: 8px;
            font-weight: 700; font-family: 'Poppins', sans-serif;
            cursor: pointer; transition: all 0.3s; font-size: 16px;
        }
        .action-btn:hover { background: #059669; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); transform: translateY(-2px); }

        .message {
            margin-top: 20px; font-size: 14px; font-weight: 600; height: 20px;
        }
        .correct { color: #10b981; }
        .wrong { color: #ef4444; animation: shake 0.4s; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .game-over-screen {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95);
            border-radius: 15px; flex-direction: column; justify-content: center; align-items: center;
        }
        .game-over-screen h2 { color: #10b981; font-family: 'Courier Prime', monospace; font-size: 28px; margin-bottom: 10px; }
        .final-score { font-size: 48px; font-weight: bold; color: white; margin: 10px 0 30px; }
    </style>
</head>
<body>

    <nav class="phantomix-navbar">
        <a href="apps.html" class="nav-logo">
            <i class="fa-solid fa-terminal" style="color: #10b981; margin-right: 8px;"></i>
            Cipher
        </a>
        <a href="apps.html" class="back-btn"><i class="fas fa-arrow-left"></i> App Hub</a>
    </nav>

    <div class="game-wrapper">
        <div class="game-header">
            <h1>WORD CIPHER</h1>
            <p>Decrypt the scrambled tech words before the mainframe resets.</p>
        </div>

        <div class="cipher-box" id="game-box">
            <div class="stats-bar">
                <div>TIME: <span class="timer" id="time-left">60s</span></div>
                <div>SCORE: <span class="score" id="score-val">0</span></div>
            </div>

            <div class="scrambled-word" id="scrambled-text">START</div>

            <div class="input-group">
                <input type="text" id="user-guess" class="guess-input" placeholder="Enter word..." autocomplete="off" disabled>
                <button class="action-btn" id="submit-btn" onclick="startGame()">START</button>
            </div>

            <div class="message" id="feedback-msg"></div>

            <div class="game-over-screen" id="game-over">
                <h2>CONNECTION LOST</h2>
                <div style="color: #94a3b8;">Final Decryption Score</div>
                <div class="final-score" id="final-score-val">0</div>
                <button class="action-btn" style="padding: 15px 30px;" onclick="startGame()">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        const techWords = [
            "HACKER", "PHANTOMIX", "NETWORK", "SERVER", "CRYPTO", 
            "ENCRYPT", "SYSTEM", "STARTUP", "FLUTTER", "PYTHON",
            "DIAMOND", "VAULT", "MAINFRAME", "CYBER", "CODE"
        ];

        let currentWord = "";
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let isPlaying = false;

        const scrambledText = document.getElementById("scrambled-text");
        const guessInput = document.getElementById("user-guess");
        const submitBtn = document.getElementById("submit-btn");
        const timeDisplay = document.getElementById("time-left");
        const scoreDisplay = document.getElementById("score-val");
        const feedbackMsg = document.getElementById("feedback-msg");
        const gameOverScreen = document.getElementById("game-over");
        const finalScoreVal = document.getElementById("final-score-val");

        // Scramble logic
        function scrambleWord(word) {
            let arr = word.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }

        function loadNewWord() {
            const randomIndex = Math.floor(Math.random() * techWords.length);
            currentWord = techWords[randomIndex];
            
            let scrambled = scrambleWord(currentWord);
            // Ensure it doesn't accidentally scramble to the real word
            while(scrambled === currentWord && currentWord.length > 1) {
                scrambled = scrambleWord(currentWord);
            }
            
            scrambledText.innerText = scrambled;
            guessInput.value = "";
            guessInput.focus();
        }

        function startGame() {
            isPlaying = true;
            score = 0;
            timeLeft = 60;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft + "s";
            timeDisplay.style.color = "#ef4444";
            
            gameOverScreen.style.display = "none";
            guessInput.disabled = false;
            submitBtn.innerText = "SUBMIT";
            submitBtn.setAttribute("onclick", "checkGuess()");
            feedbackMsg.innerText = "";
            
            loadNewWord();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft + "s";
                
                if (timeLeft <= 10) {
                    timeDisplay.style.animation = "shake 0.5s infinite";
                }
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function checkGuess() {
            if (!isPlaying) return;
            
            const userGuess = guessInput.value.trim().toUpperCase();
            
            if (userGuess === currentWord) {
                score += 10;
                scoreDisplay.innerText = score;
                feedbackMsg.innerText = "ACCESS GRANTED +10";
                feedbackMsg.className = "message correct";
                loadNewWord();
            } else {
                feedbackMsg.innerText = "ACCESS DENIED";
                feedbackMsg.className = "message wrong";
                guessInput.value = "";
                guessInput.focus();
            }
            
            setTimeout(() => { feedbackMsg.innerText = ""; }, 1500);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            guessInput.disabled = true;
            timeDisplay.style.animation = "none";
            
            finalScoreVal.innerText = score;
            gameOverScreen.style.display = "flex";
        }

        // Allow pressing Enter to submit
        guessInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkGuess();
            }
        });
    </script>
</body>
</html>
