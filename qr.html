    <h1>📡 Quick QR Terminal</h1>
    <p>Real-time vector matrix encoder.</p>

    <input type="text" id="qr-data" placeholder="Paste secure URL or text stream here..." oninput="generateQRMatrix()">

    <div>
        <div id="qr-canvas"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        // Global handler instantiation for reference control
        let qrContainer = document.getElementById("qr-canvas");
        let qrcodeInstance = null;

        function generateQRMatrix() {
            const rawString = document.getElementById("qr-data").value;

            // Container clean down for redraw event logic
            qrContainer.innerHTML = "";

            if(!rawString) {
                return;
            }

            // Client runtime instance compilation
            qrcodeInstance = new QRCode(qrContainer, {
                text: rawString,
                width: 160,
                height: 160,
                colorDark : "#00ff00",  // Hardcore Neon Green Matrix
                colorLight : "#111111", // Dark Node Background
                correctLevel : QRCode.CorrectLevel.H // High error correction protocol
            });
        }
    </script>
