<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Community | Phantomix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 🎨 CUSTOM PHANTOMIX TEXT SELECTION */
        ::selection {
            background-color: #0ea5e9; /* Neon Blue */
            color: #ffffff; /* White Text */
        }
        
        /* Firefox browser ke liye */
        ::-moz-selection {
            background-color: #0ea5e9;
            color: #ffffff;
        }
        /* ✨ PREMIUM FADE-IN ANIMATION */
        body {
            animation: appLoad 0.8s ease-out forwards;
        }

        @keyframes appLoad {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        body {
            margin: 0; padding: 0; padding-top: 80px;
            font-family: 'Poppins', sans-serif;
            background-color: #020617; 
            color: #ffffff;
            text-align: center; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05) 0%, transparent 60%);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        .phantomix-navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; box-sizing: border-box;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.3); z-index: 1000;
        }
        .nav-logo { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; text-decoration: none; }
        .back-btn {
            background: rgba(14, 165, 233, 0.1); color: #0ea5e9;
            padding: 6px 14px; border: 1px solid #0ea5e9; border-radius: 6px;
            text-decoration: none; font-size: 13px; font-weight: 600; transition: all 0.3s ease;
        }
        .back-btn:hover { background: #0ea5e9; color: #020617; box-shadow: 0 0 15px rgba(14, 165, 233, 0.6); }
        .logout-btn {
            background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-left: 10px;
            padding: 6px 14px; border: 1px solid #ef4444; border-radius: 6px;
            cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;
        }
        .logout-btn:hover { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }

        .chat-wrapper { max-width: 800px; margin: 20px auto 40px; padding: 0 20px; }
        .chat-header { margin-bottom: 20px; }
        .chat-header h1 { color: #0ea5e9; font-size: 32px; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(14, 165, 233, 0.3); }
        .chat-header p { color: #94a3b8; font-size: 14px; margin: 0; }

        .chat-box {
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; height: 60vh; min-height: 400px;
        }

        #chat-messages {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            padding-right: 10px; margin-bottom: 20px; text-align: left;
        }

        .msg-bubble {
            background: rgba(30, 41, 59, 0.6); padding: 12px 18px; 
            border-radius: 12px; border-left: 3px solid #0ea5e9; 
            font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-sender { color: #0ea5e9; font-weight: 700; font-family: 'Courier Prime', monospace; margin-right: 8px; }
        .msg-time { color: #64748b; font-size: 11px; }
        .msg-text { color: #e2e8f0; display: block; margin-top: 5px; word-wrap: break-word; }

        .input-group { display: flex; gap: 10px; }
        .sender-input {
            width: 140px; padding: 12px; border-radius: 8px;
            border: 1px solid #334155; background: #020617; color: #10b981;
            font-size: 14px; font-family: 'Courier Prime', monospace; font-weight: bold;
            outline: none; transition: all 0.3s;
        }
        .msg-input {
            flex: 1; padding: 12px 15px; border-radius: 8px;
            border: 1px solid #334155; background: #020617; color: white;
            font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; transition: all 0.3s;
        }
        .msg-input:focus { border-color: #0ea5e9; box-shadow: 0 0 10px rgba(14, 165, 233, 0.2); }
        
        .send-btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white;
            border: none; padding: 0 20px; border-radius: 8px;
            font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 16px;
        }
        .send-btn:hover { box-shadow: 0 0 15px rgba(14, 165, 233, 0.5); transform: translateY(-2px); }

        @media (max-width: 600px) {
            .input-group { flex-wrap: wrap; }
            .sender-input { width: 100%; }
        }
    </style>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-LX3YH0GSZG');
</script>
</head>
<body>

    <nav class="phantomix-navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-users" style="color: #0ea5e9; margin-right: 8px;"></i> Community
        </a>
        <div>
            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> Home</a>
            <button class="logout-btn" onclick="logoutNode()"><i class="fas fa-power-off"></i> Logout</button>
        </div>
    </nav>

    <div class="chat-wrapper">
        <div class="chat-header">
            <h1>Global Node Chat</h1>
            <p>Connect with other verified founders and early adopters.</p>
        </div>

        <div class="chat-box">
            <div id="chat-messages">
                <div style="text-align: center; color: #64748b; font-size: 13px; margin-top: auto; margin-bottom: auto;">
                    <i class="fas fa-satellite-dish fa-spin"></i> Authenticating and Connecting to Mainframe...
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="chat-sender" class="sender-input" readonly>
                <input type="text" id="chat-text" class="msg-input" placeholder="Transmit secure message..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button class="send-btn" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // 🔒 DIGITAL BOUNCER: Checking if user is logged in
        const userToken = localStorage.getItem("phantomix_token");
        const userId = localStorage.getItem("phantomix_user_id");
        const savedAlias = localStorage.getItem("phantomix_alias");

        if (!userToken || !userId || !savedAlias) {
            // Agar login nahi hai, sidha login page par feko
            window.location.href = "login.html";
        }

        // ⚠️ APNI ASLI API KEYS YAHAN ZAROOR DALEIN
        const SUPABASE_URL = "https://pekmsttmosuzcvielala.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBla21zdHRtb3N1emN2aWVsYWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjY4NDUsImV4cCI6MjA5OTAwMjg0NX0.D0akjMO2d5sYhgbSy8IIFJT4sPHGO_Lm9r1YMWM_uUc";

        // Setting the locked Alias in the input box
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById("chat-sender").value = savedAlias;
            document.getElementById("chat-sender").style.background = "#0f172a";
        });

        // 🚪 Logout Function
        function logoutNode() {
            localStorage.removeItem("phantomix_token");
            localStorage.removeItem("phantomix_user_id");
            localStorage.removeItem("phantomix_alias");
            window.location.href = "login.html";
        }

        async function fetchChatMessages() {
            try {
                // Fetching messages (Read is allowed for anyone, but we pass token for good measure)
                const response = await fetch(`${SUPABASE_URL}/rest/v1/global_chat?select=*&order=created_at.desc&limit=50`, {
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": `Bearer ${userToken}` 
                    }
                });
                
                if (response.status === 401) {
                    // Token expired or invalid
                    logoutNode();
                    return;
                }

                const messages = await response.json();
                const chatBox = document.getElementById("chat-messages");
                messages.reverse(); 
                
                const isScrolledToBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 50;

                chatBox.innerHTML = "";
                messages.forEach(msg => {
                    const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    // Basic Word Filter (Security check)
                    let safeMsg = msg.message.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
                    let safeAlias = msg.alias.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    chatBox.innerHTML += `
                        <div class="msg-bubble">
                            <span class="msg-sender">[${safeAlias}]</span> 
                            <span class="msg-time">${time}</span>
                            <span class="msg-text">${safeMsg}</span>
                        </div>
                    `;
                });

                if (isScrolledToBottom) chatBox.scrollTop = chatBox.scrollHeight;

            } catch(e) { 
                console.error("Chat sync failed", e); 
            }
        }

        async function sendChatMessage() {
            const messageInput = document.getElementById("chat-text");
            const message = messageInput.value.trim();

            if(!message) return;

            messageInput.value = ""; 
            
            try {
                // Sending message with secure Token and User ID
                const response = await fetch(`${SUPABASE_URL}/rest/v1/global_chat`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${userToken}`, // Token proves who is sending
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        user_id: userId,   // Yeh database match karega!
                        alias: savedAlias, // User ka locked naam
                        message: message 
                    })
                });

                if (!response.ok) {
                    throw new Error("Unauthorized Transmission");
                }
                
                fetchChatMessages(); 
                
                setTimeout(() => {
                    const chatBox = document.getElementById("chat-messages");
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 100);

            } catch(e) { 
                alert("Transmission Failed! Please login again.");
            }
        }

        // Auto-refresh chat every 3 seconds
        setInterval(fetchChatMessages, 3000);
        window.addEventListener('load', fetchChatMessages);
    </script>
</body>
</html>
